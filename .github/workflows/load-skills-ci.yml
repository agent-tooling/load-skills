name: load-skills CI

on:
  pull_request:
    paths:
      - "**"
      - ".github/workflows/load-skills-ci.yml"
  push:
    branches:
      - main
    paths:
      - "**"
      - ".github/workflows/load-skills-ci.yml"
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Format check
        run: pnpm run fmt:check
