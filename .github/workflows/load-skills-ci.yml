name: load-skills CI

on:
  pull_request:
    paths:
      - "**"
      - ".github/workflows/load-skills-ci.yml"
  push:
    branches:
      - main
    paths:
      - "**"
      - ".github/workflows/load-skills-ci.yml"
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Format check
        run: bun run fmt:check
